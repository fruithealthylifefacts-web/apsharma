<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ansh Pratap VIP Result Portal</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at center, #0f2027, #000000);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
    position: relative;
}

.bg-text span {
    position: absolute;
    color: rgba(0,255,255,0.08);
    font-size: 40px;
    animation: float 8s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh) rotate(0deg); }
    to { transform: translateY(-100vh) rotate(360deg); }
}

.logo {
    position: absolute;
    top: 20px;
    right: 25px;
    padding: 10px 18px;
    border-radius: 30px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px #00ffff;
    color: #00ffff;
    font-weight: bold;
}

.container {
    width: 380px;
    padding: 35px;
    border-radius: 25px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    box-shadow: 0 0 40px rgba(0,255,255,0.4);
    text-align: center;
}

select, input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.12);
    color: white;
}

button {
    width: 100%;
    padding: 13px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ff00cc, #00ffff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 0 15px #ff00cc;
}

/* 😱 VOICE BUTTON */
.voice-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    font-size: 30px;
    border: none;
    cursor: pointer;
    background: linear-gradient(45deg, red, #ff00cc);
    box-shadow: 0 0 25px red;
    animation: pulse 1.5s infinite;
}

/* 🫡 SALUTE BUTTON */
.salute-btn {
    position: fixed;
    bottom: 25px;
    left: 25px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    font-size: 30px;
    border: none;
    cursor: pointer;
    background: gold;
    color: black;
    box-shadow: 0 0 25px gold;
    animation: pulse 1.5s infinite;
}

/* 🤗 UPPER BUTTON */
.hug-btn {
    position: fixed;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 70px;
    border-radius: 50%;
    font-size: 30px;
    border: none;
    cursor: pointer;
    background: #ffcc00;
    color: black;
    box-shadow: 0 0 25px #ffcc00;
    animation: pulse 1.5s infinite;
}

/* ☠️ AND ANSH EMOJI FALL */
.emoji {
    position: absolute;
    font-size: 24px;
    user-select: none;
    pointer-events: none;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(100vh) rotate(720deg); }
}

.captcha-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#captcha {
    background: black;
    padding: 10px 15px;
    border-radius: 10px;
    letter-spacing: 3px;
    color: #00ffcc;
}

.popup {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    padding: 30px;
    border-radius: 20px;
    background: rgba(0,0,0,0.8);
    box-shadow: 0 0 40px #00ffff;
}
</style>
</head>

<body>

<div class="bg-text">
    <span style="left:5%">ANSH</span>
    <span style="left:25%">PRATAP</span>
    <span style="left:50%">VIP</span>
    <span style="left:70%">RESULT</span>
</div>

<div class="logo">⚡ ANSH PRATAP</div>

<div class="container">
    <h2>UP Board Result</h2>

    <select id="year">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
    </select>

    <select id="class">
        <option value="12">Class 12</option>
        <option value="10">Class 10</option>
    </select>

    <input type="text" id="roll" placeholder="Enter 10 digit Roll Number"
           maxlength="10"
           oninput="this.value=this.value.replace(/[^0-9]/g,'')">

    <div class="captcha-box">
        <div id="captcha">ANSH</div>
        <span onclick="generateCaptcha()">👻</span>
    </div>

    <input type="text" id="captchaInput" placeholder="Enter Captcha">

    <button onclick="openResult()">Check Result</button>
</div>

<!-- BUTTONS -->
<button class="voice-btn" onclick="playVoice()">😱</button>
<button class="salute-btn" onclick="spawnSkulls()">🫡</button>
<button class="hug-btn" onclick="spawnAnsh()">🤗</button>

<!-- VOICE AUDIO -->
<audio id="voiceAudio" preload="auto">
    <source src="https://www.soundjay.com/human/sounds/applause-8.mp3">
</audio>

<audio id="sound" preload="auto">
<source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="popupText">🎉 RESULT OPENING...</h2>
    </div>
</div>

<script>
let captchaValue = "ANSH";

/* 🔊 VOICE FUNCTION */
function playVoice(){
    let audio = document.getElementById("voiceAudio");
    audio.currentTime = 0;
    audio.play();
}

/* 🔥 CONTROL SYSTEM */
let result2026Available = false;

function generateCaptcha(){
    document.getElementById("captcha").innerText = captchaValue;
}

function openResult(){
    let roll=document.getElementById("roll").value;
    let cap=document.getElementById("captchaInput").value.toUpperCase();

    if(roll.length!=10){ alert("Enter exactly 10 digit roll number"); return; }
    if(cap !== captchaValue){ alert("Wrong captcha (Type ANSH)"); return; }

    let y=document.getElementById("year").value;
    let c=document.getElementById("class").value;

    if(y=="2026" && !result2026Available){
        document.getElementById("popup").style.display="flex";
        document.getElementById("popupText").innerText="❌ RESULT NOT AVAILABLE";
        return;
    }

    let url="";
    if(y=="2023"||y=="2024"){
        url=(c=="12")?"https://upresults.upmsp.edu.in/ResultSearchModel/Intermediate?startYear=2023&endYear=2024":"https://upresults.upmsp.edu.in/ResultSearchModel/HighSchool?startYear=2023&endYear=2024&resultType=reg";
    }
    if(y=="2025"){
        url=(c=="12")?"https://upresults.upmsp.edu.in/ResultSearchModel/Intermediate?startYear=2025&endYear=2025":"https://upresults.upmsp.edu.in/ResultSearchModel/HighSchool?startYear=2025&endYear=2025";
    }
    if(y=="2026"){
        url=(c=="12")?"https://upresults.upmsp.edu.in/ResultSearchModel/Intermediate?startYear=2026&endYear=2026":"https://upresults.upmsp.edu.in/ResultSearchModel/HighSchool?startYear=2026&endYear=2026";
    }

    document.getElementById("popup").style.display="flex";
    document.getElementById("popupText").innerText="🎉 RESULT OPENING...";
    document.getElementById("sound").play();

    setTimeout(()=>{
        window.open(url,"_blank");
        document.getElementById("popup").style.display="none";
    },1000);
}

/* 🫡 SPAWN 100 ☠️ EMOJIS */
function spawnSkulls(){
    for(let i=0;i<100;i++){
        let skull=document.createElement("div");
        skull.classList.add("emoji");
        skull.innerText="☠️";
        skull.style.left=Math.random()*window.innerWidth+"px";
        skull.style.fontSize=(20+Math.random()*20)+"px";
        skull.style.animationDuration=(2+Math.random()*3)+"s";
        document.body.appendChild(skull);
        setTimeout(()=>{skull.remove()},4000);
    }
}

/* 🤗 SPAWN 500 ANSH TEXT */
function spawnAnsh(){
    for(let i=0;i<500;i++){
        let ansh=document.createElement("div");
        ansh.classList.add("emoji");
        ansh.innerText="ANSH";
        ansh.style.left=Math.random()*window.innerWidth+"px";
        ansh.style.top="-50px";
        ansh.style.fontSize=(12+Math.random()*20)+"px";
        ansh.style.color="cyan";
        ansh.style.animationDuration=(3+Math.random()*5)+"s";
        document.body.appendChild(ansh);
        setTimeout(()=>{ansh.remove()},6000);
    }
}

generateCaptcha();
</script>

</body>
</html>
